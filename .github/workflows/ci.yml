on: [push, pull_request]
name: CI
jobs:
  test:
    strategy:
      matrix:
        platform: [ubuntu-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v6
      
      - run: npm ci
      - run: npm run build:all
      - run: npm run lint

      - name: Check generated lib is clean
        run: |
          if ! git diff --quiet -- ./lib; then
            git diff -- ./lib
            echo "::error::./lib has uncommitted changes after build"
            exit 1
          fi
